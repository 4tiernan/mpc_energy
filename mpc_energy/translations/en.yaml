configuration:
  accepted_risks:
    name: Confirm you have read and accepted the risks associated with use of this app.
    
  ha_mqtt_user:
    name: MQTT Broker Username

  ha_mqtt_pass:
    name: MQTT Brocker Password

  energy_retailer:
    name: Energy Retailer
    description: Select your energy retailer to use their price data.
  
  demand_price:
    name: Demand Price
    description: If you are on a demand tarrif please enter the price per kW (not kWh) during the demand window.
  
  demand_window_start:
    name: Demand Window Start Time
    description: If you are on a demand tarrif please enter the start time of the demand window in 24 hour format, e.g. 16:00 for 4pm.
  
  demand_window_end:
    name: Demand Window End Time
    description: If you are on a demand tarrif please enter the end time of the demand window in 24 hour format, e.g. 21:00 for 9pm.
  
  amber_api_key:
    name: Amber API Key

  amber_site_id:
    name: Amber Site ID
    description: If you do not know your site number, simply don't enter anything, start the app and check the logs for your site number.
 
  battery_discharge_cost:
    name: Battery Discharge Cost (c/kWh)
    description: Effective cost of discharging the battery (Leave at default if unsure).

  spike_price_warning_level:
    name: Spike Price Warning Level (c/kWh)
    description: Set a price level at which you want to receive warnings about potential spikes in the feed in price. (Set to 999 to turn off warnings, default is 25c/kWh)

  notification_target:
    name: Notification Target
    description: Set this to the HA entity ID of a device you want to receive notifications on for spikes in feed in price, e.g. a mobile phone (notify.mobile_app_pixel_10_pro). (Leave blank to not receive notifications)

  notification_target_option:
    name: Notification Target Option
    description: Use this to specify what notifications you would like to receive on the notification target.

  estimated_daily_load_energy_consumption:
    name: Estimated Daily Load Energy Consumption (kWh)
    description: Enter your approximate daily energy consumption. (This is used until the system has enough historical data to build a model of your usage which takes 3 days)

  battery_power_sign_convention:
    name: Battery Power Sign Convention
    description: Select which sign convention your battery uses. Sigenergy uses - Charge, + Discharge by default.

  battery_max_discharge_power_limit_entity_id:
    name: Max Battery Discharge Power (kW, Set to a value or an entity)
  
  battery_max_charge_power_limit_entity_id:
    name: Max Battery Charge Power (kW, Set to a value or an entity)

  inverter_max_power_limit_entity_id:
    name: Max Inverter AC Power (kW, Set to a value or an entity)
  
  pv_max_power_limit_entity_id:
    name: Max PV DC Power (kW, Set to a value or an entity)
    description: Please see the onboarding docs for how to set this value.

  import_max_power_limit_entity_id:
    name: Max Import Power (kW, Set to a value or an entity)
    description: Lower this value if you are tripping breakers, see onboarding docs for more info on how to set this.

  export_max_power_limit_entity_id:
    name: Max Export Power (kW, Set to a value or an entity)
    description: Lower this value if you are tripping breakers, see onboarding docs for more info on how to set this.

  solcast_forecast_today_entity_id:
    name: Solcast Forecast Today Entity (kWh with attributes for whole day)

  solcast_forecast_tomorrow_entity_id:
    name: Solcast Forecast Tomorrow Entity (kWh with attributes for whole day)
  
  solcast_forecast_day_3_entity_id: 
    name: Solcast Forecast Day 3 Entity (kWh with attributes for whole day)
  
  solcast_forecast_day_4_entity_id:
    name: Solcast Forecast Day 4 Entity (kWh with attributes for whole day)

  solcast_solar_kwh_remaining_today_entity_id:
    name: Solcast Solar kWh Forecast Remaining Today (kWh)

  solcast_solar_power_this_hour_entity_id:
    name: Solcast Power This Hour Entity (Wh)

  ha_ems_control_switch_entity_id:
    name: HA EMS Control Switch Entity
    description: Entity that allows home assistant to take control of the ems

  ems_control_mode_entity_id:
    name: EMS Control Mode Selector Entity

  load_power_entity_id:
    name: Load Power Entity (kW)

  solar_power_entity_id:
    name: Solar Power Entity (kW)

  battery_power_entity_id:
    name: Battery Power Entity (kW)
  
  inverter_power_entity_id:
    name: Inverter Power Entity (kW, + Generating, - Consuming)

  grid_power_entity_id:
    name: Grid Net Power Entity (kW, + Importing, - Exporting)
  
  battery_soc_entity_id:
    name: Battery SOC Entity (Percentage)

  battery_stored_energy_entity_id:
    name: Battery Energy Stored Entity (kWh)

  battery_kwh_till_full_entity_id:
    name: Battery Charge Available Entity (kWh till battery full)

  plant_solar_kwh_today_entity_id:
    name: Solar Energy Generated Today Entity (kWh)

  plant_daily_load_kwh_entity_id:
    name: Load Energy Consumed Today Entity (kWh)

  plant_daily_import_kwh_entity_id:
    name: Grid Import Energy Today Entity (kWh)
  
  plant_daily_export_kwh_entity_id:
    name: Grid Export Energy Today Entity (kWh)

  battery_rated_capacity_entity_id:
    name: Battery Rated Storage Capacity Entity (kWh)

  backup_soc_entity_id:
    name: ESS Battery Backup SOC Entity (Percentage, reserve for blackouts)
  
  charge_cutoff_soc_entity_id:
    name: ESS Battery Charge Cut-off SOC Entity (Percentage, maximum charge limit)
  
  battery_discharge_limiter_entity_id:
    name: Battery Discharge Power Limiter (kW, to control system)
  
  battery_charge_limiter_entity_id:
    name: Battery Charge Power Limiter (kW, to control system)
  
  pv_limiter_entity_id:
    name: PV Power Limiter (kW, to control system)
  
  export_limiter_entity_id:
    name: Export Power Limiter (kW, to control system)

  import_limiter_entity_id: 
    name: Import Power Limiter (kW, to control system)

  log_level:
    name: Log Level